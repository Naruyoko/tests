<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>>RFC 9226 Converter</title>
  <script type="module">
    import * as rfc9226 from "./rfc9226.js";
    const inputElem=document.getElementById("input"),
      outputElem=document.getElementById("output");
    document.getElementById("d2bi").onclick=_=>
      outputElem.value=rfc9226.dec2bioct(BigInt(inputElem.value));
    document.getElementById("d2bf").onclick=_=>
      outputElem.value=rfc9226.dec2bioct(Number(inputElem.value));
    document.getElementById("b2di").onclick=_=>
      outputElem.value=rfc9226.bioct2decBigint(inputElem.value);
    document.getElementById("b2df").onclick=_=>
      outputElem.value=rfc9226.bioct2decNumber(inputElem.value);
    window.rfc9226=rfc9226;
  </script>
</head>
<body>
  <h1>RFC 9226 Converter</h1>
  <input type="text" id="input">
  <input type="text" id="output" readonly>
  <button id="d2bi">Decimal &rarr; Bioctal, integer</button>
  <button id="d2bf">Decimal &rarr; Bioctal, float</button>
  <button id="b2di">Bioctal &rarr; Decimal, integer</button>
  <button id="b2df">Bioctal &rarr; Decimal, float</button>
  <p><a href="https://datatracker.ietf.org/doc/html/rfc9226" target="_blank" rel="noopener noreferrer">📄</a> 👀</p>
  <hr>
  <p>Last updated: 2026/04/15</p>
</body>
</html>
